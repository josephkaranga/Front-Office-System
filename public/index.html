<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>KYSHAKEZ Front Office</title>
  <style>
    body { margin: 0; background: #f0f2f5; }
    #root { min-height: 100vh; }
    .app-loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 8px;
    }
    .app-loader-text {
      color: #6b7280; font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loader">
      <p class="app-loader-text">Loading...</p>
    </div>
  </div>
</body>
</html>
